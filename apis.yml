aid: hong-kong-baptist-university
name: Hong Kong Baptist University
description: >-
  Hong Kong Baptist University (HKBU) is a publicly funded research university in
  Hong Kong SAR, ranked #253 in the QS World University Rankings 2025. Its public,
  machine-readable footprint centers on research information: the HKBU Scholars
  research portal is powered by Elsevier Pure, which exposes a documented Pure Web
  Service API (OpenAPI 3) for research outputs, persons, organisations, and related
  metadata. HKBU also operates a mobile-app backend and various library and digital
  scholarship platforms, though most of these are gated or undocumented for external
  developers and require institutional affiliation. There is no central institutional
  developer portal or organization-wide GitHub org; public code is published by
  individual research groups.
