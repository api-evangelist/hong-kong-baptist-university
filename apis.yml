    description: >-
      REST web service API for the HKBU Scholars research portal, powered by Elsevier
      Pure. Exposes the Pure data model (research outputs, persons, organisations,
      projects, activities, and related metadata) as a graph of interconnected
      resources over standard HTTP methods. The OpenAPI 3.0.1 contract is publicly
      retrievable and interactive RapiDoc documentation is served from the same host;
      data endpoints require an API key (return HTTP 401 without one).
